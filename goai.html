<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <title>로딩 중…</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #f9f9f9; padding: 40px; max-width: 600px; margin: auto; position: relative; }
    h1 { text-align: center; margin-bottom: 30px; font-size: 1.5em; }
    .field { margin-bottom: 20px; }
    label { font-weight: bold; display: block; margin-bottom: 5px; }
    .btn-group { display: flex; gap: 5px; align-items: center; }
    input[type="text"] { flex: 1; height: 36px; padding: 5px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
    textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
    button { height: 36px; padding: 0 10px; background: #1d72b8; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
    button:hover { background: #135a96; }
    .btn-red { background: #e74c3c; }
    .btn-red:hover { background: #c0392b; }

#toast {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: #0cb5cf;
  color: white;
  padding: 10px 20px;
  border-radius: 6px;
  opacity: 0;
  transition: opacity 0.3s ease;
}
  </style>
</head>
<body>

<h1 id="pageTitle">로딩 중… 프롬프트 작성기</h1>

<!-- 기존 입력부 전부 동일 -->

<!-- 완성된 문장 -->
<div class="field">
  <label>완성된 문장</label>

  <!-- ✅ 추가된 링크 (HTML만 추가) -->
  <a href="#" id="naverMapLink" style="
    display:inline-block;
    margin-bottom:8px;
    font-size:13px;
    color:#1d72b8;
    text-decoration:underline;
    cursor:pointer;
  ">📍 네이버 지도에서 위치 확인</a>

  <textarea id="finalSentence" rows="15"></textarea>
  <div class="btn-group">
    <button onclick="clearSentence()">지우기</button>
    <button onclick="copySentence()">복사</button>
    <button id="btnBack" class="btn-red">리스트로 돌아가기</button>
  </div>
</div>

<div id="toast">복사되었습니다!</div>

<script>
/* ✅ 기존 스크립트 전부 그대로 유지 */
/* (Supabase, loadUserConfig, loadData 등 원본 코드 그대로 있어야 함) */

/* ✅ 오직 이 부분만 추가 */
window.addEventListener('DOMContentLoaded', () => {
  const link = document.getElementById('naverMapLink');
  if (!link) return;

  link.addEventListener('click', (e) => {
    e.preventDefault();

    const title = document.getElementById('titleInput')?.value.trim();
    const loca  = document.getElementById('locaInput')?.value.trim();

    if (!title && !loca) {
      alert('업체명 또는 위치 정보가 없습니다.');
      return;
    }

    const keyword = encodeURIComponent(`${title} ${loca}`);
    window.open(`https://map.naver.com/v5/search/${keyword}`, '_blank');
  });
});
</script>

</body>
</html>
